name: Check Spelling

# Comment management is handled through a secondary job, for details see:
# https://github.com/check-spelling/check-spelling/wiki/Feature%3A-Restricted-Permissions
#
# `jobs.comment-push` runs when a push is made to a repository and the `jobs.spelling` job needs to make a comment
#   (in odd cases, it might actually run just to collapse a comment, but that's fairly rare)
#   it needs `contents: write` in order to add a comment.
#
# `jobs.comment-pr` runs when a pull_request is made to a repository and the `jobs.spelling` job needs to make a comment
#   or collapse a comment (in the case where it had previously made a comment and now no longer needs to show a comment)
#   it needs `pull-requests: write` in order to manipulate those comments.

# Updating pull request branches is managed via comment handling.
# For details, see: https://github.com/check-spelling/check-spelling/wiki/Feature:-Update-expect-list
#
# These elements work together to make it happen:
#
# `on.issue_comment`
#   This event listens to comments by users asking to update the metadata.
#
# `jobs.update`
#   This job runs in response to an issue_comment and will push a new commit
#   to update the spelling metadata.
#
# `with.experimental_apply_changes_via_bot`
#   Tells the action to support and generate messages that enable it
#   to make a commit to update the spelling metadata.
#
# `with.ssh_key`
#   In order to trigger workflows when the commit is made, you can provide a
#   secret (typically, a write-enabled github deploy key).
#
#   For background, see: https://github.com/check-spelling/check-spelling/wiki/Feature:-Update-with-deploy-key

# SARIF reporting
#
# Access to SARIF reports is generally restricted (by GitHub) to members of the repository.
#
# Requires enabling `security-events: write`
# and configuring the action with `use_sarif: 1`
#
#   For information on the feature, see: https://github.com/check-spelling/check-spelling/wiki/Feature:-SARIF-output

# Minimal workflow structure:
#
# on:
#   push:
#     ...
#   pull_request_target:
#     ...
# jobs:
#   # you only want the spelling job, all others should be omitted
#   spelling:
#     # remove `security-events: write` and `use_sarif: 1`
#     # remove `experimental_apply_changes_via_bot: 1`
#     ... otherwise, adjust the `with:` as you wish

# on.pull_request(_target).edited is only needed for with.check_commit_messages: title | description

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request_target:
    branches:
      - '**'
    types:
      - 'edited'
      - 'opened'
      - 'reopened'
      - 'synchronize'
  issue_comment:
    types:
      - 'created'

permissions: {}

jobs:
  spelling:
    name: Check Spelling
    permissions:
      contents: read
      pull-requests: read
      actions: read
      security-events: write
    outputs:
      followup: ${{ steps.spelling.outputs.followup }}
    runs-on: ubuntu-latest
    if: ${{ (contains(github.event_name, 'pull_request') && github.event.pull_request.state == 'open') || github.event_name == 'push' }}
    concurrency:
      group: spelling-${{ github.event.pull_request.number || github.ref }}
      # note: If you use only_check_changed_files, you do not want cancel-in-progress
      cancel-in-progress: true
    steps:
      - name: check-spelling
        id: spelling
        uses: check-spelling/check-spelling@prerelease
        with:
          suppress_push_for_open_pull_request: ${{ github.actor != 'dependabot[bot]' && 1 }}
          checkout: true
          check_file_names: 1
          check_commit_messages: commits, title, description
          spell_check_this: check-spelling/spell-check-this@prerelease
          report-timing: 1
          warnings: bad-regex,binary-file,deprecated-feature,ignored-expect-variant,large-file,limited-references,no-newline-at-eof,noisy-file,non-alpha-in-dictionary,token-is-substring,unexpected-line-ending,whitespace-in-dictionary,minified-file,unsupported-configuration,no-files-to-check,unclosed-block-ignore-begin,unclosed-block-ignore-end
          experimental_apply_changes_via_bot: 1
          use_sarif: 1
          check-images: 1
          extra_dictionary_limit: 20
          allow-hunspell: false
          load-config-from: |
            {
              "pr-base-keys": [
                "check_extra_dictionaries",
                "dictionary_source_prefixes",
                "extra_dictionaries",
                ""
              ],
              "pr-trusted-keys": [
                ""
              ],
              "": []
            }

  locales:
    name: Check for localizations
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      go: ${{ steps.supported.outputs.go }}
      locales: ${{ steps.supported.outputs.matrix }}

    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: checkout merge
        if: github.event.pull_request.number && (contains(github.event_name, 'pull_request'))
        uses: check-spelling/checkout-merge@162501326ecbc16584b42b58cecadc367ad1bb33
      - name: find supported localizations
        id: supported
        run: |
          : find supported localizations
          files=$(mktemp)
          git ls-files -z > "$files"
          locales=$(
            for a in $(find .github/actions/spelling-locales -mindepth 1 -maxdepth 1 -type d ! -name '.*' ! -name 'common'); do
              a="$a" perl -e '
                use File::Basename;
                sub readfile {
                  my @lines;
                  open F, q{<}, $_;
                  while (<F>) {
                    s/\r\n/\n/;
                    push @lines, $_;
                  }
                  local $f = join "\n", @lines;
                  $f =~ s/^#.*\r?\n//gm;
                  $f =~ s/^\s*\r?\n//gm;
                  $f =~ s/\r\n/\n/gm;
                  $f =~ s/\n$//;
                  return $f;
                }
                sub readstring {
                  my @files = glob($_[0]);
                  my @lines = map readfile, @files;
                  my $f = join "\n", @lines;
                  $f =~ s/(.*)\r?\n/(?:$1)|/g;
                  return $f;
                }
                sub QE {
                  my ($re) = @_;
                  $re =~ s/\\Q(.*?)\\E/quotemeta($1)/eg;
                  return $re;
                }
                my $a = "$ENV{a}";
                my $e = QE(readstring("$a/excludes.txt"));
                $e = q<^$> if $e eq "";
                my $o = QE(readstring("$a/only.txt"));
                $o = q<.> if $o eq "";
                my $found = 0;
                {
                  local $/ = "\0";
                  while (<>) {
                    chomp;
                    next if /$e/; next unless /$o/;
                    $found = 1;
                    last;
                  }
                }
                if ($found) {
                  my $b = basename $a;
                  my $n = $b;
                  my $r = "$a/README.md";
                  if (-e $r && open (my $readme, q{<}, $r)) {
                    my $name = <$readme>;
                    $name =~ s/^\s*#\s*//;
                    $name =~ s/\s*$//;
                    $n = $name if length $name;
                    close $readme;
                  }
                  print qq<{"locale":"$b","name":"Spelling ($n)","path":"$a"}\n>;
                }
              ' "$files"
            done
          )
          (
          if [ -n "$locales" ]; then
            echo "matrix={\"include\":$(echo "$locales" | jq -c -s)}"
            echo go=1
          fi
          ) | tee -a "$GITHUB_OUTPUT"

  spelling-localizations:
    needs:
    - locales
    strategy:
      fail-fast: false
      matrix: ${{ needs.locales.outputs.locales && fromJson(needs.locales.outputs.locales) }}
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    permissions:
      contents: read
      pull-requests: read
      actions: read
      security-events: write
    if: ${{ needs.locales.outputs.go }}
    steps:
      - uses: check-spelling/check-spelling@prerelease
        with:
          config: ${{ matrix.path }}
          use_sarif: 1
          checkout: true
          report_title_suffix: ${{ matrix.locale }}
          load-config-from: |
            {
              "pr-base-keys": [
                "dictionary_url",
                "check_extra_dictionaries",
                "dictionary_source_prefixes",
                "extra_dictionaries",
                "ignore-pattern",
                "upper-pattern",
                "lower-pattern",
                "not-lower-pattern",
                "not-upper-or-lower-pattern",
                "punctuation-pattern",
                "allow-hunspell",
                ""
              ],
              "pr-trusted-keys": [
                ""
              ],
              "": []
            }

  update:
    name: Update PR
    permissions:
      contents: write
      pull-requests: write
      actions: read
    runs-on: ubuntu-slim
    if: ${{
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@check-spelling-bot') &&
      contains(github.event.comment.body, 'apply') &&
      contains(github.event.comment.body, 'https://')
      }}
    concurrency:
      group: spelling-update-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: apply spelling updates
        uses: check-spelling/check-spelling@prerelease
        with:
          experimental_apply_changes_via_bot: 1
          checkout: true
          ssh_key: '${{ secrets.CHECK_SPELLING }}'
